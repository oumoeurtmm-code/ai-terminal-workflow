version: "3.8"

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # Timezone — change to match your local zone
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-America/New_York}
      - TZ=${TZ:-America/New_York}

      # Basic auth (protects the n8n UI — required when exposing publicly)
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}

      # n8n host — update if running behind a reverse proxy or ngrok
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/}

      # AI API keys — stored here and referenced as n8n Variables inside workflows
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY}

      # Encryption key — CHANGE THIS before first run; backs up your credentials
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-change-me-before-first-run}

      # Persist execution history (adjust retention as needed)
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=none
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168

    volumes:
      # Persistent storage for workflows, credentials, and execution data
      - n8n_data:/home/node/.n8n

    # Health check — ensures the container is responding before dependents start
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  n8n_data:
    driver: local
